services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - TZ=${TZ:-Asia/Shanghai}
    expose:
      - "8003"
    volumes:
      - ${DOWNLOADS_PATH:-./musicdl_outputs}:/app/musicdl_outputs
      - ${LOGS_PATH:-./logs}:/app/logs
      - ${DATA_PATH:-./data}:/app/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8003/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile.auth
    restart: unless-stopped
    environment:
      - TZ=${TZ:-Asia/Shanghai}
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ./docker/.htpasswd:/etc/nginx/.htpasswd:ro
    ports:
      - "${WEB_PORT:-8080}:80"
